<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Roblox Clone Prototype</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; display: flex; }
        canvas { display: block; }
        
        /* UI Panellari */
        #sidebar { width: 250px; background: #222; color: white; height: 100vh; display: flex; flex-direction: column; }
        #toolbar { position: absolute; top: 10px; left: 260px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; }
        .panel { padding: 15px; border-bottom: 1px solid #444; }
        h3 { margin-top: 0; font-size: 16px; color: #aaa; }
        
        /* Explorer va Properties */
        #explorer-list { list-style: none; padding: 0; max-height: 200px; overflow-y: auto; }
        #explorer-list li { padding: 5px; cursor: pointer; border-bottom: 1px solid #333; }
        #explorer-list li:hover { background: #444; }
        .prop-group { margin-bottom: 10px; }
        .prop-group label { display: block; font-size: 12px; color: #888; }
        input { width: 100%; background: #333; border: 1px solid #555; color: white; padding: 3px; }

        button { cursor: pointer; background: #444; color: white; border: 1px solid #666; padding: 5px 10px; margin: 2px; }
        button:hover { background: #666; }
        .active { background: #007bff !important; }
    </style>
</head>
<body>

    <!-- Sidebar: Explorer va Properties -->
    <div id="sidebar">
        <div class="panel">
            <h3>Explorer</h3>
            <ul id="explorer-list"></ul>
        </div>
        <div class="panel" id="properties-panel">
            <h3>Properties</h3>
            <div id="props-content">Tanlang...</div>
        </div>
        <div class="panel">
            <button onclick="saveProject()">Loyihani Saqlash (JSON)</button>
            <button onclick="addBox()">+ Kub Qo'shish</button>
        </div>
    </div>

    <!-- Toolbar -->
    <div id="toolbar">
        <button id="btn-edit" class="active" onclick="setMode('edit')">Edit Mode</button>
        <button id="btn-play" onclick="setMode('play')">Play Mode (Fizika)</button>
        <span> | Gizmo: </span>
        <button onclick="setGizmo('translate')">Move</button>
        <button onclick="setGizmo('rotate')">Rotate</button>
        <button onclick="setGizmo('scale')">Scale</button>
    </div>

    <!-- Kutubxonalar -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        // --- 1. ASOSIY O'ZGARUVCHILAR ---
        let scene, camera, renderer, controls, gizmo, raycaster, mouse;
        let objects = [];
        let isPlayMode = false;
        let selectedObject = null;

        init();
        animate();

        function init() {
            // Sahna
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x333333);

            // Kamera
            camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 250) / window.innerHeight, 0.1, 1000);
            camera.position.set(10, 10, 10);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth - 250, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Chiroq
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 7.5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // Grid (Setka)
            const grid = new THREE.GridHelper(20, 20, 0x888888, 0x444444);
            scene.add(grid);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            gizmo = new TransformControls(camera, renderer.domElement);
            gizmo.addEventListener('dragging-changed', (e) => controls.enabled = !e.value);
            scene.add(gizmo);

            // Raycaster (Obyekt tanlash uchun)
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            window.addEventListener('click', onMouseClick);
            window.addEventListener('resize', onWindowResize);
        }

        // --- 2. OBYEKT BOSHQARUVI ---
        window.addBox = function() {
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff });
            const box = new THREE.Mesh(geometry, material);
            box.position.y = 0.5;
            box.name = "Part_" + objects.length;
            
            scene.add(box);
            objects.push(box);
            updateExplorer();
            selectObject(box);
        };

        function onMouseClick(event) {
            if (isPlayMode) return;
            if (event.clientX < 250) return; // Sidebar bosilsa ishlamasin

            mouse.x = ((event.clientX - 250) / (window.innerWidth - 250)) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects);

            if (intersects.length > 0) {
                selectObject(intersects[0].object);
            }
        }

        function selectObject(obj) {
            selectedObject = obj;
            gizmo.attach(obj);
            updateProperties();
            updateExplorer();
        }

        // --- 3. UI YANGILASH ---
        function updateExplorer() {
            const list = document.getElementById('explorer-list');
            list.innerHTML = '';
            objects.forEach((obj, index) => {
                const li = document.createElement('li');
                li.innerText = obj.name;
                li.onclick = () => selectObject(obj);
                if(selectedObject === obj) li.style.background = '#007bff';
                list.appendChild(li);
            });
        }

        function updateProperties() {
            const panel = document.getElementById('props-content');
            if (!selectedObject) return;

            panel.innerHTML = `
                <div class="prop-group">
                    <label>Nomi</label>
                    <input type="text" value="${selectedObject.name}" onchange="updateObjProp('name', this.value)">
                </div>
                <div class="prop-group">
                    <label>Rangi</label>
                    <input type="color" value="#${selectedObject.material.color.getHexString()}" onchange="updateObjProp('color', this.value)">
                </div>
                <div class="prop-group">
                    <label>Position Y</label>
                    <input type="number" step="0.1" value="${selectedObject.position.y}" onchange="updateObjProp('posy', this.value)">
                </div>
            `;
        }

        window.updateObjProp = function(prop, val) {
            if (!selectedObject) return;
            if (prop === 'name') selectedObject.name = val;
            if (prop === 'color') selectedObject.material.color.set(val);
            if (prop === 'posy') selectedObject.position.y = parseFloat(val);
            updateExplorer();
        };

        window.setGizmo = function(mode) {
            gizmo.setMode(mode);
        };

        // --- 4. PLAY / EDIT MODES ---
        window.setMode = function(mode) {
            isPlayMode = (mode === 'play');
            document.getElementById('btn-edit').className = isPlayMode ? '' : 'active';
            document.getElementById('btn-play').className = isPlayMode ? 'active' : '';
            
            if (isPlayMode) {
                gizmo.detach();
                console.log("Fizika ishga tushdi...");
            } else {
                if (selectedObject) gizmo.attach(selectedObject);
            }
        };

        // --- 5. SAQLASH (JSON) ---
        window.saveProject = function() {
            const data = objects.map(obj => ({
                name: obj.name,
                pos: obj.position,
                rot: obj.rotation,
                scale: obj.scale,
                color: obj.material.color.getHex()
            }));
            const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'project.json';
            a.click();
        };

        function onWindowResize() {
            camera.aspect = (window.innerWidth - 250) / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth - 250, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (isPlayMode) {
                // Oddiy "Gravity" simulyatsiyasi
                objects.forEach(obj => {
                    if (obj.position.y > 0.5) {
                        obj.position.y -= 0.05; 
                    }
                });
            }
            
            renderer.render(scene, camera);
        }
    </script>
</body>
                                                                                  </html>
