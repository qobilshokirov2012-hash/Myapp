<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Studio Clone v2</title>
    <style>
        :root { --bg: #1e1e1e; --panel: #2d2d2d; --text: #ffffff; --accent: #007bff; }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); display: flex; }
        
        /* Menu Uch nuqta */
        #menu-btn { position: absolute; top: 10px; left: 10px; font-size: 24px; cursor: pointer; z-index: 100; background: var(--panel); padding: 5px 15px; border-radius: 5px; }
        
        /* Sidebars */
        .sidebar { width: 250px; background: var(--panel); height: 100vh; border-right: 1px solid #444; display: none; flex-direction: column; z-index: 90; }
        .right-panel { width: 250px; background: var(--panel); height: 100vh; border-left: 1px solid #444; display: flex; flex-direction: column; }
        
        canvas { flex-grow: 1; outline: none; }

        /* Toolbox & Blocks */
        .item-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .block-item { background: #3d3d3d; padding: 10px; text-align: center; cursor: pointer; border-radius: 5px; font-size: 12px; }
        .block-item:hover { background: var(--accent); }

        /* Skript Editor */
        #script-panel { position: absolute; bottom: 20px; left: 270px; right: 270px; height: 200px; background: #1a1a1a; border: 1px solid var(--accent); display: none; flex-direction: column; }
        #script-input { flex-grow: 1; background: transparent; color: #00ff00; border: none; padding: 10px; font-family: monospace; resize: none; }
        
        /* UI Elementlari */
        .panel-header { padding: 10px; background: #383838; font-weight: bold; border-bottom: 1px solid #555; }
        button { cursor: pointer; background: #444; color: white; border: none; padding: 8px; margin: 5px; border-radius: 3px; }
        button.active { background: var(--accent); }
        input, select { background: #333; color: white; border: 1px solid #555; padding: 5px; width: 90%; margin: 5px auto; display: block; }
    </style>
</head>
<body>

    <div id="menu-btn" onclick="toggleSidebar()">⋮ Menu</div>

    <!-- Chap Panel: Toolbox -->
    <div id="left-sidebar" class="sidebar">
        <div class="panel-header">Toolbox (Obyektlar)</div>
        <div class="item-grid">
            <div class="block-item" onclick="addPart('grass')">🌿 O't Blok</div>
            <div class="block-item" onclick="addPart('brick')">🧱 G'isht</div>
            <div class="block-item" onclick="addPart('neon')">💎 Neon</div>
            <div class="block-item" onclick="addPart('wood')">🪵 Yog'och</div>
            <div class="block-item" onclick="addPart('sphere')">🔮 Shar</div>
        </div>
        <div class="panel-header">Rejim</div>
        <button id="play-btn" onclick="togglePlay()">▶️ Play</button>
        <button onclick="toggleScript()">💻 Script Editor</button>
    </div>

    <!-- O'yin Maydoni -->
    <canvas id="gameCanvas"></canvas>

    <!-- Skript Paneli -->
    <div id="script-panel">
        <div class="panel-header" style="display: flex; justify-content: space-between;">
            <span>Script.lua (JavaScript syntax)</span>
            <button onclick="runScript()" style="margin: 0; padding: 2px 10px;">Run</button>
        </div>
        <textarea id="script-input" placeholder="// Tanlangan blokni 'part' deb chaqiring. Masalan: part.position.y += 2;"></textarea>
    </div>

    <!-- O'ng Panel: Explorer & Properties -->
    <div class="right-panel">
        <div class="panel-header">Explorer</div>
        <div id="explorer" style="height: 40%; overflow-y: auto; padding: 10px;"></div>
        <div class="panel-header">Properties</div>
        <div id="properties" style="padding: 10px;"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        let scene, camera, renderer, controls, gizmo, raycaster, mouse;
        let objects = [];
        let selectedObject = null;
        let isPlaying = false;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Sky color

            camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 500) / window.innerHeight, 0.1, 1000);
            camera.position.set(10, 10, 10);

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
            renderer.setSize(window.innerWidth - 500, window.innerHeight);

            // Yer (Baseplate)
            const floorGeo = new THREE.PlaneGeometry(100, 100);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x3a5f0b });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Chiroqlar
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            controls = new OrbitControls(camera, renderer.domElement);
            gizmo = new TransformControls(camera, renderer.domElement);
            gizmo.addEventListener('dragging-changed', (e) => controls.enabled = !e.value);
            scene.add(gizmo);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            window.addEventListener('mousedown', onMouseDown);
            window.addEventListener('resize', onResize);
        }

        // Blok qo'shish funksiyasi
        window.addPart = function(type) {
            let geo = new THREE.BoxGeometry(2, 2, 2);
            let mat;

            switch(type) {
                case 'grass':
                    mat = new THREE.MeshStandardMaterial({ color: 0x4CAF50, roughness: 0.8 }); // Yashil va g'adir-budur
                    break;
                case 'brick':
                    mat = new THREE.MeshStandardMaterial({ color: 0xA52A2A });
                    break;
                case 'neon':
                    mat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2 });
                    break;
                case 'wood':
                    mat = new THREE.MeshStandardMaterial({ color: 0x5D4037 });
                    break;
                case 'sphere':
                    geo = new THREE.SphereGeometry(1.5, 32, 32);
                    mat = new THREE.MeshStandardMaterial({ color: 0xffffff });
                    break;
            }

            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = 1;
            mesh.name = type + "_" + objects.length;
            scene.add(mesh);
            objects.push(mesh);
            selectObject(mesh);
            updateExplorer();
        };

        function onMouseDown(e) {
            if (e.target.tagName !== 'CANVAS') return;
            
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects);

            if (intersects.length > 0) {
                selectObject(intersects[0].object);
            }
        }

        function selectObject(obj) {
            selectedObject = obj;
            if (!isPlaying) gizmo.attach(obj);
            updateProperties();
        }

        function updateExplorer() {
            const el = document.getElementById('explorer');
            el.innerHTML = objects.map(o => `<div onclick="selectObjectByName('${o.name}')" style="cursor:pointer; padding:2px; ${selectedObject === o ? 'background:#555' : ''}">${o.name}</div>`).join('');
        }

        window.selectObjectByName = (name) => {
            const obj = objects.find(o => o.name === name);
            if(obj) selectObject(obj);
        };

        function updateProperties() {
            const el = document.getElementById('properties');
            if (!selectedObject) return;
            el.innerHTML = `
                <label>Nomi</label><input type="text" value="${selectedObject.name}" oninput="selectedObject.name=this.value; updateExplorer()">
                <label>Rang</label><input type="color" value="#${selectedObject.material.color.getHexString()}" oninput="selectedObject.material.color.set(this.value)">
                <label>Y-O'qi</label><input type="number" step="0.5" value="${selectedObject.position.y}" oninput="selectedObject.position.y=parseFloat(this.value)">
            `;
        }

        // Skript Tizimi
        window.runScript = function() {
            if (!selectedObject) return alert("Avval blokni tanlang!");
            const code = document.getElementById('script-input').value;
            try {
                // Skript ichida 'part' o'zgaruvchisi tanlangan blokga teng bo'ladi
                const scriptFunc = new Function('part', 'THREE', code);
                scriptFunc(selectedObject, THREE);
            } catch (err) {
                alert("Xato: " + err.message);
            }
        };

        window.toggleSidebar = () => {
            const sb = document.getElementById('left-sidebar');
            sb.style.display = sb.style.display === 'flex' ? 'none' : 'flex';
            onResize();
        };

        window.toggleScript = () => {
            const sp = document.getElementById('script-panel');
            sp.style.display = sp.style.display === 'flex' ? 'none' : 'flex';
        };

        window.togglePlay = () => {
            isPlaying = !isPlaying;
            document.getElementById('play-btn').classList.toggle('active');
            if(isPlaying) gizmo.detach();
            else if(selectedObject) gizmo.attach(selectedObject);
        };

        function onResize() {
            const width = window.innerWidth - (document.getElementById('left-sidebar').style.display === 'flex' ? 250 : 0) - 250;
            camera.aspect = width / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(width, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isPlaying) {
                // Play rejimida oddiy harakat (Gravity yoki skript harakati kutiladi)
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
